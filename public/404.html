<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AVIXA Discovery Instrument</title>
    <!--
      GitHub Pages SPA fallback. This app is single-view (no client-side router),
      so deep links are not normally generated. This file exists only as a safety
      net: any unknown path under the Pages subpath redirects back to the app root.
    -->
    <script>
      (function () {
        var base = location.pathname.replace(/[^/]*$/, '');
        location.replace(location.origin + base);
      })();
    </script>
  </head>
  <body></body>
</html>
